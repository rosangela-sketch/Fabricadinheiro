<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA | Fábrica de Dinheiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .gold-text { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(191, 149, 63, 0.2); border-radius: 24px; }
        .btn-gold { background: linear-gradient(135deg, #bf953f, #aa771c); color: #000; font-weight: 900; transition: 0.4s; cursor: pointer; border: none; }
        .btn-gold:hover { filter: brightness(1.2); box-shadow: 0 0 30px rgba(191, 149, 63, 0.3); }
        
        /* Ajuste da Seta e Campos */
        .field { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 12px; padding: 14px; width: 100%; outline: none; color: white; margin-bottom: 15px; display: block; font-size: 14px; }
        .field:focus { border-color: #bf953f; }
        
        select.field { 
            appearance: auto !important; /* Força a seta padrão do sistema aparecer */
            background-color: #1a1a1a;
            color: white;
        }

        .lang-btn { cursor: pointer; opacity: 0.4; transition: 0.3s; font-size: 10px; font-weight: bold; letter-spacing: 2px; }
        .lang-btn.active { opacity: 1; color: #bf953f; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <nav class="w-full max-w-2xl flex justify-center gap-8 py-8">
        <span class="lang-btn active">PORTUGUÊS</span>
        <span class="lang-btn">ENGLISH</span>
        <span class="lang-btn">ESPAÑOL</span>
    </nav>

    <header class="text-center mb-10 w-full">
        <h1 class="text-4xl md:text-6xl font-900 tracking-tighter uppercase italic gold-text mb-2">Fábrica de Dinheiro</h1>
        <p class="text-gray-400 tracking-[0.1em] text-xs md:text-sm">
            Estratégia <span class="text-white font-black">NOVA</span> de Alta <span class="text-white font-black">CONVERSÃO</span>
        </p>
    </header>

    <main class="w-full max-w-xl glass-card p-6 md:p-10">
        <div id="input-view">
            <p class="text-[#bf953f] font-bold mb-8 text-center uppercase tracking-widest text-[10px]">Parâmetros de Produção</p>
            
            <label class="text-[10px] text-gray-500 uppercase ml-1">1. O Produto</label>
            <input type="text" id="p1" class="field" placeholder="Ex: Sapato Casual, Marmita de Frango...">
            
            <label class="text-[10px] text-gray-500 uppercase ml-1">2. Diferencial (O que ele tem de verdade?)</label>
            <input type="text" id="p2" class="field" placeholder="Ex: Conforto extremo, sem conservantes...">
            
            <label class="text-[10px] text-gray-500 uppercase ml-1">3. Público (Para quem?)</label>
            <input type="text" id="p3" class="field" placeholder="Ex: Mulheres executivas, Academias...">
            
            <label class="text-[10px] text-gray-500 uppercase ml-1">4. Tom de Voz</label>
            <select id="p4" class="field">
                <option value="sofisticado">Sofisticado</option>
                <option value="simples">Simples</option>
            </select>

            <button onclick="gerar()" id="btn-acao" class="w-full btn-gold py-5 rounded-xl text-lg uppercase italic mt-6">Ativar Produção</button>
        </div>

        <div id="result-view" class="hidden">
            <div id="output" class="text-gray-200 text-lg leading-relaxed italic mb-10 whitespace-pre-line font-light p-4"></div>
            <button onclick="reset()" class="w-full text-gray-600 text-[10px] uppercase tracking-[0.5em] font-bold hover:text-white transition">Nova Ordem</button>
        </div>
    </main>

    <script>
        const apiKey = "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";

        async function gerar() {
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;
            const p3 = document.getElementById('p3').value;
            const p4 = document.getElementById('p4').value;

            if(!p1 || !p2) { alert("Preencha os campos."); return; }

            const btn = document.getElementById('btn-acao');
            btn.innerText = "PROCESSANDO..."; btn.disabled = true;

            try {
                const r = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [
                            {role: "system", content: "Você é um copywriter da marca NOVA. Crie headlines e textos baseados APENAS na realidade fornecida, sem inventar luxos se o produto for simples. Seja preciso."},
                            {role: "user", content: `Produto: ${p1}. Diferencial: ${p2}. Público: ${p3}. Tom: ${p4}.`}
                        ],
                        temperature: 0.7
                    })
                });
                const d = await r.json();
                document.getElementById('input-view').classList.add('hidden');
                document.getElementById('result-view').classList.remove('hidden');
                document.getElementById('output').innerText = d.choices[0].message.content;
            } catch (e) { alert("Erro."); reset(); }
        }

        function reset() {
            document.getElementById('input-view').classList.remove('hidden');
            document.getElementById('result-view').classList.add('hidden');
            document.getElementById('btn-acao').disabled = false;
            document.getElementById('btn-acao').innerText = "Ativar Produção";
        }
    </script>
</body>
</html>
